# Prod-shape compose. Used both for local validation of the production
# topology (Caddy + static frontend + locked-down backend) and for the
# GCE VM deploy. Two TLS modes via the CADDYFILE build arg:
#
#   - CADDYFILE=Caddyfile (default)
#     Auto-TLS for {$DOMAIN:localhost}. Local CA when DOMAIN=localhost,
#     Let's Encrypt for a real domain (only works if the host is publicly
#     reachable on port 80 and the DNS A record points here directly —
#     i.e. NOT behind Cloudflare orange-cloud).
#
#   - CADDYFILE=Caddyfile.cloudflare
#     Static TLS via the Cloudflare Origin Cert. Required for the
#     orange-cloud (proxied) deploy: CF terminates browser TLS at its
#     edge, validates this cert on the CF→origin hop (Full strict),
#     and forwards. Cert files come from ./backend/.secrets/cf-origin/
#     (gitignored).
#
# Local validation: `docker compose -f docker-compose.prod.yml up -d --build`
# GCE deploy     : `CADDYFILE=Caddyfile.cloudflare DOMAIN=solboards.xyz \
#                    docker compose -f docker-compose.prod.yml up -d --build`

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solboards-backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    volumes:
      # Secrets (Privy + GCS service account) and the SQLite DB / creatives
      # dir persist on the host. No code bind mount — image is the source of
      # truth in prod.
      - ./backend/.secrets:/app/.secrets:ro
      - ./backend/data:/app/data
    restart: unless-stopped

  caddy:
    # Multi-stage image: builds the SPA inside node:20-alpine, then bakes
    # the static dist/ + selected Caddyfile into a caddy:2-alpine layer.
    # Build context is the repo root so the image can pull both frontend/
    # and the top-level Caddyfile(.cloudflare).
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        CADDYFILE: ${CADDYFILE:-Caddyfile}
    container_name: solboards-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      # caddy_data holds Let's Encrypt certs + the local CA. Persisting it
      # avoids re-issuing on every restart (LE has rate limits). Unused
      # when CADDYFILE=Caddyfile.cloudflare (static cert), but harmless.
      - caddy_data:/data
      - caddy_config:/config
      # Cloudflare Origin Cert. Only consumed when CADDYFILE=Caddyfile.cloudflare;
      # the dev-validation Caddyfile ignores this path. Bind mount is :ro and
      # the source dir is gitignored (backend/.secrets/).
      - ./backend/.secrets/cf-origin:/etc/caddy/cf-origin:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
