# Prod-shape compose. Used both for local validation of the production
# topology (Caddy + static frontend + locked-down backend) and for the
# eventual GCE VM deploy. Domain controlled by the DOMAIN env var:
#   - unset / "localhost" → Caddy issues a local self-signed cert
#   - real hostname       → Caddy fetches a Let's Encrypt cert on first boot
#
# Local: `docker compose -f docker-compose.prod.yml up -d --build`
# Prod : `DOMAIN=your-domain.com docker compose -f docker-compose.prod.yml up -d --build`

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: x402-adserver-backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    volumes:
      # Secrets (Privy + GCS service account) and the SQLite DB / creatives
      # dir persist on the host. No code bind mount — image is the source of
      # truth in prod.
      - ./backend/.secrets:/app/.secrets:ro
      - ./backend/data:/app/data
    restart: unless-stopped

  caddy:
    # Multi-stage image: builds the SPA inside node:20-alpine, then bakes
    # the static dist/ + Caddyfile into a caddy:2-alpine layer. Build
    # context is the repo root so the image can pull both frontend/ and
    # the top-level Caddyfile.
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: x402-adserver-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      # caddy_data holds Let's Encrypt certs + the local CA. Persisting it
      # avoids re-issuing on every restart (LE has rate limits).
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
