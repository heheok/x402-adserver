services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: x402-adserver-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/.secrets:/app/.secrets:ro
      # Bind-mount data dir so the user-supplied venues.json + dev SQLite DB
      # both live on the host. Whole dir is gitignored — venues.json is
      # publisher-private inventory, DB is local dev state.
      - ./backend/data:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: x402-adserver-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      # Anonymous volume keeps the image's node_modules from being shadowed
      # by the host mount. Rebuild the image when package.json changes.
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

